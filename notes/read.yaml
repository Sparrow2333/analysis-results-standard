outputs:
  - id: Out_QS_By_Trt
    name: Questionnaire Summary by Treatment
    displays:
      - order: 1
        display:
          id: Disp_QS_By_Trt
          name: Questionnaire Summary Display
          displayTitle: "Questionnaire Summary by Treatment"
