      - operationId: Op_Count
        resultGroups:
          - groupingId: Grp_TRT
            groupValue: Drug X
          - groupingId: Grp_RESP
            groupValue: No
        rawValue: "36"
        formattedValue: "36"

  - id: An_Q2_Pct_ByTrtResp
    name: Q2 Percent by Treatment and Response
    reason:
