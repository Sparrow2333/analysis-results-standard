    purpose:
      controlledTerm: PRIMARY OUTCOME MEASURE
    dataset: ADQS
    variable: USUBJID
    analysisSetId: AS_Female_SAF
    dataSubsetId: DS_Q2
    methodId: Mth_Count
    orderedGroupings:
      - order: 1
        groupingId: Grp_TRT
        resultsByGroup: true
      - order: 2
        groupingId: Grp_RESP
        resultsByGroup: true
    results:
      - operationId: Op_Count
        resultGroups:
          - groupingId: Grp_TRT
            groupValue: Placebo
          - groupingId: Grp_RESP
            groupValue: Yes
        rawValue: "10"
        formattedValue: "10"
      - operationId: Op_Count
        resultGroups:
          - groupingId: Grp_TRT
            groupValue: Placebo
          - groupingId: Grp_RESP
            groupValue: No
        rawValue: "36"
        formattedValue: "36"
      - operationId: Op_Count
        resultGroups:
          - groupingId: Grp_TRT
            groupValue: Drug X
          - groupingId: Grp_RESP
            groupValue: Yes
        rawValue: "12"
